<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playa — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --primary-light: #d1fae5;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #ffffff;
            --font: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Main centred content ── */
        .page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px 40px;
            text-align: center;
        }

        /* ── Logo block ── */
        .logo-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .logo-block img {
            width: 72px;
            height: auto;
            display: block;
        }
        .wordmark {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--primary);
        }

        /* ── Kicker ── */
        .kicker {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--primary);
            margin-bottom: 16px;
            display: block;
        }

        /* ── Subheading ── */
        .subheading {
            font-size: clamp(1.1rem, 3vw, 1rem);
            font-weight: 500;
            color: var(--text-muted);
            max-width: 460px;
            line-height: 1.65;
            margin-bottom: 36px;
        }

        /* ── Email form ── */
        .email-form {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 440px;
            margin-bottom: 14px;
        }
        .email-input {
            flex: 1;
            padding: 13px 18px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.9375rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            background: #f9fafb;
        }
        .email-input::placeholder { color: #9ca3af; }
        .email-input:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .btn-notify {
            padding: 13px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn-notify:hover { background: var(--primary-dark); }

        /* ── Muted helper text ── */
        .muted-text {
            font-size: 0.8125rem;
            color: #9ca3af;
            margin-bottom: 48px;
        }

        /* ── Divider ── */
        .divider {
            width: 40px;
            height: 1px;
            background: var(--border);
            margin: 0 auto 40px;
        }

        /* ── App store badges ── */
        .app-badges {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .badge-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 11px 22px;
            font-family: var(--font);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            text-align: left;
        }
        .badge-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .badge-btn svg { flex-shrink: 0; color: var(--text-muted); }
        .badge-btn:hover svg { color: var(--primary); }
        .badge-label-small {
            display: block;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1;
            margin-bottom: 2px;
        }
        .badge-label-large {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }
        .badge-btn:hover .badge-label-small,
        .badge-btn:hover .badge-label-large { color: var(--primary); }

        /* ── Footer ── */
        footer {
            padding: 24px;
            text-align: center;
            font-size: 0.8125rem;
            color: #9ca3af;
        }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            .email-form {
                flex-direction: column;
            }
            .btn-notify {
                width: 100%;
            }
            .wordmark { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

    <main class="page">

        <!-- Logo -->
        <div class="logo-block">
            <img src="images/playalogo.png" alt="Playa logo">
            <span class="wordmark">PLAYAH</span>
        </div>

        <!-- Kicker -->
        <span class="kicker">Coming Soon</span>

        <!-- Subheading -->
        <p class="subheading">
            The coaching marketplace built for the next generation of athletes. Launching May 2026.
        </p>

        <!-- Email capture -->
        <form class="email-form" onsubmit="handleSubmit(event)">
            <input
                type="email"
                class="email-input"
                placeholder="Enter your email"
                required
            >
            <button type="submit" class="btn-notify">Notify Me</button>
        </form>

        <p class="muted-text">Be the first to know when we launch.</p>

        <div class="divider"></div>

        <!-- App store badges -->
        <div class="app-badges">
            <button class="badge-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.54 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                </svg>
                <div>
                    <span class="badge-label-small">Coming to the</span>
                    <span class="badge-label-large">App Store</span>
                </div>
            </button>

            <button class="badge-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3.18 23.76c.3.17.64.24.99.19l12.6-7.27-2.7-2.7-10.89 9.78zM.5 1.1C.19 1.43 0 1.96 0 2.67v18.67c0 .71.19 1.24.51 1.57l.08.08 10.46-10.46v-.25L.58 1.02.5 1.1zM20.37 10.23l-2.99-1.73-3.01 3.01 3.01 3.01 3-1.74c.86-.5.86-1.31-.01-1.55zM4.17.24L16.77 7.5l-2.7 2.7L3.18.42A1.17 1.17 0 014.17.24z"/>
                </svg>
                <div>
                    <span class="badge-label-small">Coming to</span>
                    <span class="badge-label-large">Google Play</span>
                </div>
            </button>
        </div>

    </main>

    <footer>
        © 2026 Playa App.
    </footer>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            var input = e.target.querySelector('.email-input');
            var btn   = e.target.querySelector('.btn-notify');
            btn.textContent  = 'You\'re on the list ✓';
            btn.style.background = '#047857';
            input.disabled   = true;
            btn.disabled     = true;
        }
    </script>

</body>
</html>
